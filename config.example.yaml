llm:
  provider: openai_compatible
  base_url: "http://127.0.0.1:1234/v1"
  api_key: "not-needed"
  model: "qwen3.5-4b-mlx"
  temperature: 0.3
  context_window_tokens: 8192

agent:
  default_thread_id: "1"

memory:
  checkpointer:
    type: "in_memory"
  store:
    enabled: true
    type: "in_memory"

observability:
  logging:
    enabled: true
    level: "INFO"
    format: "text"
    redact: true
    directory: "./logs"
    full_payloads:
      enabled: true
      redact: false
      include_prompts: true
      include_messages: true
      include_tools: true
      include_outputs: true

summarization:
  enabled: true
  model: "main"
  trigger:
    type: "fraction"
    value: 0.8
  keep:
    type: "messages"
    value: 20
  trim_tokens_to_summarize: 4000
